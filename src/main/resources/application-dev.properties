# Perfil de Desenvolvimento
spring.config.activate.on-profile=dev

# JPA/Hibernate - Controle via variável de ambiente
spring.jpa.show-sql=${HIBERNATE_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}

# Logging - Controle via variável de ambiente
logging.level.org.hibernate.SQL=${HIBERNATE_LOG_LEVEL:ERROR}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_LOG_LEVEL:ERROR}

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
