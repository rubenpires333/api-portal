spring.application.name=backend

# Ativar perfil de desenvolvimento por padrão
spring.profiles.active=dev

# Path matching strategy
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_portal_api}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:apiportal}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apiportal123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar Flyway (já que as tabelas serão gerenciadas pelo Hibernate)
spring.flyway.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Keycloak
keycloak.url=${KEYCLOAK_URL:http://localhost:8180}
keycloak.realm=${KEYCLOAK_REALM:portal-api}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:portal-api}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
keycloak.admin.username=${KEYCLOAK_ADMIN:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}

# Frontend URL para OAuth2 callback
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.override-with-generic-response=false

# DevTools - Hot Reload para desenvolvimento
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**,templates/**

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
app.upload.avatars-dir=uploads/avatars
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Google reCAPTCHA
recaptcha.enabled=${RECAPTCHA_ENABLED:false}
recaptcha.site-key=${RECAPTCHA_SITE_KEY:}
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY:}

# Configurações de Segurança - Login Attempts
security.login.max-attempts-before-captcha=3
security.login.max-attempts-before-block=5
security.login.block-duration-minutes=15
security.login.reset-attempts-hours=24

# Email Configuration
spring.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
mail.from.email=${MAIL_FROM_EMAIL:noreply@apiportal.com}
mail.from.name=${MAIL_FROM_NAME:API Portal}

# Billing / Stripe Configuration
# Configure as variáveis de ambiente no arquivo .env
billing.stripe.api-key=${STRIPE_API_KEY:}
billing.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
billing.stripe.price-id-starter=${STRIPE_PRICE_ID_STARTER:price_1TIau37KdKMF57Na0MFSEZ07}
billing.stripe.price-id-growth=${STRIPE_PRICE_ID_GROWTH:price_1TIauu7KdKMF57NaGkQ8oTah}
billing.stripe.price-id-business=${STRIPE_PRICE_ID_BUSINESS:price_1TIavR7KdKMF57NabH0ZH82d}
billing.platform-commission-percentage=${PLATFORM_COMMISSION_PERCENTAGE:20.00}
billing.holdback-days=${HOLDBACK_DAYS:14}
billing.auto-approve-threshold=${AUTO_APPROVE_THRESHOLD:50.00}
