spring.application.name=backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_portal_api}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:apiportal}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apiportal123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar Flyway (já que as tabelas serão gerenciadas pelo Hibernate)
spring.flyway.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Keycloak
keycloak.url=${KEYCLOAK_URL:http://localhost:8180}
keycloak.realm=${KEYCLOAK_REALM:portal-api}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:portal-api}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:RNEWX0EvC41j5ytpCg9Qw6EuhcEJdixn}
keycloak.admin.username=${KEYCLOAK_ADMIN:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin123}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}

# Frontend URL para OAuth2 callback
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.override-with-generic-response=false

# DevTools - Hot Reload para desenvolvimento
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**,templates/**

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Permissões Customizadas (opcional)
# Adicione novas permissões aqui que serão criadas automaticamente ao iniciar a aplicação
# Formato: app.permissions.custom[index].propriedade=valor
