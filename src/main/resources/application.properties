spring.application.name=backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apiportal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:apiportal}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apiportal123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar Flyway (já que as tabelas serão gerenciadas pelo Hibernate)
spring.flyway.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Keycloak
keycloak.url=${KEYCLOAK_URL:http://localhost:8080}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
