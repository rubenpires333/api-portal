# Billing Module Configuration

# Platform Commission
billing.platform-commission-percentage=20.00

# Holdback Period (days)
billing.holdback-days=14

# Auto-approve threshold for withdrawals
billing.auto-approve-threshold=50.00

# Stripe Configuration
# IMPORTANTE: Configure os secrets em application-local.properties (não commitado)
# Veja application-local.properties.example para referência
billing.stripe.price-id-starter=price_starter
billing.stripe.price-id-growth=price_growth
billing.stripe.price-id-business=price_business

# Vinti4 Configuration (Cabo Verde)
billing.vinti4.api-key=${VINTI4_API_KEY:}
billing.vinti4.merchant-id=${VINTI4_MERCHANT_ID:}
billing.vinti4.webhook-secret=${VINTI4_WEBHOOK_SECRET:}

# Frontend URL
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
