# Billing Module Configuration

# Platform Commission
billing.platform-commission-percentage=${PLATFORM_COMMISSION_PERCENTAGE:20.00}

# Holdback Period (days)
billing.holdback-days=${HOLDBACK_DAYS:14}

# Auto-approve threshold for withdrawals
billing.auto-approve-threshold=${AUTO_APPROVE_THRESHOLD:50.00}

# Stripe Configuration
# Configure as variûÀveis de ambiente no arquivo .env
billing.stripe.api-key=${STRIPE_API_KEY:}
billing.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
billing.stripe.price-id-starter=${STRIPE_PRICE_ID_STARTER:price_starter}
billing.stripe.price-id-growth=${STRIPE_PRICE_ID_GROWTH:price_growth}
billing.stripe.price-id-business=${STRIPE_PRICE_ID_BUSINESS:price_business}

# Vinti4 Configuration (Cabo Verde)
billing.vinti4.api-key=${VINTI4_API_KEY:}
billing.vinti4.merchant-id=${VINTI4_MERCHANT_ID:}
billing.vinti4.webhook-secret=${VINTI4_WEBHOOK_SECRET:}

# Frontend URL
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
